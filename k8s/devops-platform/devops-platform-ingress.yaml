apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-platform-ingress
  namespace: devops
spec:
  ingressClassName: traefik
  rules:
    - host: app.devops.lab
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devops-platform
                port:
                  number: 8000
