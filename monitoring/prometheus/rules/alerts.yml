groups:
  - name: homelab-alerts
    rules:
      - alert: NodeExporterDown
        expr: up{job="node_exporter"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Node Exporter is down"
          description: "Node Exporter on {{ $labels.instance }} has been down for more than 1 minute."

      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{job="node_exporter", mode="idle"}[5m])) * 100) > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage on {{ $labels.instance }} is above 80% for more than 2 minutes."

      - alert: HighMemoryUsage
        expr: ((node_memory_MemTotal_bytes{job="node_exporter"} - node_memory_MemAvailable_bytes{job="node_exporter"}) / node_memory_MemTotal_bytes{job="node_exporter"}) * 100 > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage on {{ $labels.instance }} is above 80% for more than 2 minutes."

      - alert: AlwaysFiringTest
        expr: vector(1)
        for: 10s
        labels:
          severity: info
        annotations:
          summary: "Test alert"
          description: "This is a test alert for Slack integration."
