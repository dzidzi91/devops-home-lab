name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: self-hosted

    env:
      IMAGE_NAME: 192.168.56.10:5000/devops-platform-app
      IMAGE_TAG: build-${{ github.run_number }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show environment
        run: |
          uname -m
          docker version
          docker ps

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG -f app/Dockerfile app

      - name: Tag image as ci
        run: |
          docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:ci

      - name: Push build tag
        run: |
          docker push $IMAGE_NAME:$IMAGE_TAG

      - name: Push ci tag
        run: |
          docker push $IMAGE_NAME:ci

      - name: Trigger Jenkins Deploy
        run: |
          curl --max-time 15 -i -sS -o /tmp/jenkins_response.txt -w "%{http_code}\n" \
            -X POST "${{ secrets.JENKINS_URL }}/job/devops-platform-pipeline/buildWithParameters?IMAGE_TAG=build-${{ github.run_number }}" \
            --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_API_TOKEN }}"
          echo "----- Jenkins response -----"
          cat /tmp/jenkins_response.txt